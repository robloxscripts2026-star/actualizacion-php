<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA DE INVERSIÓN TECNOLÓGICA XD V1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;700&display=swap');

        body {
            font-family: 'Chakra Petch', sans-serif;
            background: #010204;
            color: #e0e6ed;
            margin: 0;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; perspective: 1200px;
        }

        #bg-stars {
            position: absolute; width: 100%; height: 100%;
            background: url('https://i.postimg.cc/T34S4S6G/stars.png') repeat;
            opacity: 0.25; animation: moveStars 120s linear infinite; z-index: -1;
        }
        @keyframes moveStars { from { background-position: 0 0; } to { background-position: 2000px 2000px; } }

        #device {
            width: 390px; height: 820px;
            background: #05070a; border: 20px solid #1a1a1a; border-radius: 65px;
            box-shadow: 0 0 100px rgba(255, 102, 0, 0.3), inset 0 0 30px rgba(255, 102, 0, 0.15);
            overflow: hidden; position: relative;
        }

        .page { display: none; flex-direction: column; height: 100%; padding: 30px 22px; background: radial-gradient(circle at center, #0d1117 0%, #010204 100%); overflow-y: auto; }
        .active { display: flex; animation: pageSlideIn 0.5s ease-out; }
        @keyframes pageSlideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .neon-orange { text-shadow: 0 0 10px #ff6600, 0 0 20px #ff6600; }
        
        .cyber-card {
            background: rgba(255, 102, 0, 0.02); 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 102, 0, 0.12); 
            border-radius: 18px;
        }

        .short-container {
            position: relative; width: 100%; padding-bottom: 75%; height: 0; overflow: hidden; border-radius: 16px;
            border: 1px solid rgba(255, 102, 0, 0.25);
        }
        .short-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .star-btn { cursor: pointer; transition: transform 0.1s; }
        .star-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <div id="bg-stars"></div>

    <div id="device">
        <div class="page active justify-between gap-2">
            
            <div class="text-center my-auto" id="loginSection">
                <h1 class="text-2xl font-bold tracking-wider text-[#ff6600] neon-orange mb-2">CONTROL DE ACCESO</h1>
                <p class="text-xs text-gray-400 mb-6">POR FAVOR, SELECCIONA TU NOMBRE</p>
                <select id="tiaSelector" onchange="initSystem(this.value)" class="w-full bg-[#0d1117] border-2 border-[#ff6600]/40 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-[#ff6600]">
                    <option value="" disabled selected>-- Elige tu nombre aquí --</option>
                    <option value="Luisa">Tía Luisa</option>
                    <option value="Pau">Tía Pau</option>
                    <option value="Andrea">Tía Andrea</option>
                </select>
            </div>

            <div id="mainSystem" class="hidden flex flex-col gap-3 h-full justify-between">
                
                <div class="text-center">
                    <h1 class="text-lg font-bold tracking-wider text-[#ff6600] neon-orange">SISTEMA DE INVERSIÓN</h1>
                    <p class="text-[11px] text-gray-300 font-bold" id="welcomeMessage">Bienvenida</p>
                </div>

                <div class="cyber-card p-3 text-xs text-gray-300 leading-relaxed bg-black/40" id="customTextContainer">
                    </div>

                <div class="short-container">
                    <iframe src="https://www.youtube.com/embed/QWNoqk6-fIw?rel=0&modestbranding=1" title="Demo" frameborder="0" allowfullscreen></iframe>
                </div>

                <div id="step1" class="cyber-card p-3 flex flex-col gap-2">
                    <span class="text-[10px] uppercase font-bold tracking-widest text-[#ff6600]">Paso 1: Calificar Edición del Video</span>
                    <div class="flex justify-center gap-3 text-xl">
                        <i class="fa-star fa-regular star-btn text-gray-600" data-value="1" onclick="setRating(1)"></i>
                        <i class="fa-star fa-regular star-btn text-gray-600" data-value="2" onclick="setRating(2)"></i>
                        <i class="fa-star fa-regular star-btn text-gray-600" data-value="3" onclick="setRating(3)"></i>
                        <i class="fa-star fa-regular star-btn text-gray-600" data-value="4" onclick="setRating(4)"></i>
                        <i class="fa-star fa-regular star-btn text-gray-600" data-value="5" onclick="setRating(5)"></i>
                    </div>
                    <input type="hidden" id="starRating" value="0">
                    <textarea id="opinionVideo" rows="1" placeholder="¿Qué tal quedó la edición?..." class="w-full bg-[#0d1117] border border-gray-700 rounded-lg p-2 text-xs text-white resize-none focus:outline-none focus:border-[#ff6600]"></textarea>
                    <button onclick="sendVideoFeedback()" id="btnStep1" class="w-full bg-[#ff6600] text-black font-bold text-[11px] py-1.5 rounded-lg tracking-wider">
                        ENVIAR CALIFICACIÓN EDICIÓN
                    </button>
                </div>

                <div id="step2" class="cyber-card p-3 flex flex-col gap-2 opacity-40 pointer-events-none transition-all duration-300">
                    <span class="text-[10px] uppercase font-bold tracking-widest text-amber-500">Paso 2: Opinión de la Propuesta / Celular</span>
                    <textarea id="opinionPhone" rows="2" placeholder="Escribe aquí tus dudas, consejos o tu opinión sobre el equipo..." class="w-full bg-[#0d1117] border border-gray-700 rounded-lg p-2 text-xs text-white resize-none focus:outline-none focus:border-amber-500"></textarea>
                    <button onclick="sendPhoneFeedback()" id="btnStep2" class="w-full bg-amber-500 text-black font-bold text-[11px] py-1.5 rounded-lg tracking-wider">
                        ENVIAR OPINIÓN DE PROPUESTA
                    </button>
                </div>

                <div class="text-center text-[9px] text-gray-600 tracking-widest">
                    BY CODEX EZZZ | CONTROL CENTRAL
                </div>
            </div>

        </div>
    </div>

    <script>
        let selectedTia = "";
        let currentRating = 0;

        // Tus dos webhooks fijos tal como los pediste
        const webhookEdicion = "https://discord.com/api/webhooks/1491367258470219796/PApu8j67Mnz9GN8JK6vqPCiNlaZvoqnEG9GBEjSBEOXAawRGc_UY-EMXVNnenDxzUjlr";
        const webhookPropuesta = "https://discord.com/api/webhooks/1491657056686571540/CRJs0yxAdBGDf9xu-ViXGb-o9kz92f6JhZcl37n-K8yq6EbCKlm2dwuNZ39TL_3eIMMp";

        // Cambiar dinámicamente los textos según la tía seleccionada
        function initSystem(name) {
            selectedTia = name;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainSystem').classList.remove('hidden');
            document.getElementById('welcomeMessage').innerText = `PANEL EXCLUSIVO: TÍA ${name.toUpperCase()}`;

            const textContainer = document.getElementById('customTextContainer');
            
            if (name === "Luisa") {
                textContainer.innerHTML = `
                    <p class="mb-1 font-bold text-[#ff6600]">Hola tía Luisa,</p>
                    <p>Como sabes, hace poco te envié mi propuesta para adquirir una computadora. He estado analizando bien la situación y llegué a una conclusión, pero además, como me gusta mucho editar, preparé un video para explicarte todo mejor. Aquí abajo te lo dejo 😵‍C</p>
                `;
            } else if (name === "Pau" || name === "Andrea") {
                textContainer.innerHTML = `
                    <p class="mb-1 font-bold text-[#ff6600]">Hola tía ${name},</p>
                    <p class="mb-1">Les pongo en contexto: hace poco le envié a la tía Luisa mi propuesta para comprar una computadora que necesito para la prepa, y ahora también necesito mucho de su ayuda y apoyo para lograrlo.</p>
                    <p class="font-bold text-amber-500">¿Por qué prefiero esto?</p>
                    <ul class="list-disc pl-4 text-[11px] text-gray-400">
                        <li>Es inversión a largo plazo (dura 6 años).</li>
                        <li>Cuenta con 1 año de garantía.</li>
                        <li>Modificación Root: Tendré control total para aprender y potenciar mis estudios.</li>
                    </ul>
                `;
            }
        }

        function setRating(rating) {
            currentRating = rating;
            document.getElementById('starRating').value = rating;
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach(star => {
                const val = parseInt(star.getAttribute('data-value'));
                star.className = (val <= rating) ? "fa-star fa-solid star-btn text-amber-400" : "fa-star fa-regular star-btn text-gray-600";
            });
        }

        // ENVÍO DE CALIFICACIÓN DE EDICIÓN (WEBHOOK 1)
        async function sendVideoFeedback() {
            const rating = document.getElementById('starRating').value;
            const text = document.getElementById('opinionVideo').value;

            if (rating === "0" || text.trim() === "") {
                alert("Por favor califica con estrellas y deja tu opinión sobre el video.");
                return;
            }

            const data = {
                username: "Evaluador de Edición V1.0",
                content: `🎬 **CALIFICACIÓN DE EDICIÓN DEL VIDEO**\n**Tía:** Tía ${selectedTia}\n**Estrellas:** ${"⭐".repeat(rating)} (${rating}/5)\n**Opinión del Video:** ${text}`
            };

            document.getElementById('btnStep1').disabled = true;
            
            try {
                await fetch(webhookEdicion, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                alert("Paso 1 Completado. ¡Gracias! Ahora puedes opinar sobre la propuesta de hardware en el Paso 2.");
                
                // Habilitar Paso 2 y bloquear Paso 1
                document.getElementById('step1').classList.add('opacity-40', 'pointer-events-none');
                document.getElementById('step2').classList.remove('opacity-40', 'pointer-events-none');
            } catch (e) { alert("Error al conectar con el servidor."); }
        }

        // ENVÍO DE OPINIÓN DE LA PROPUESTA (WEBHOOK 2)
        async function sendPhoneFeedback() {
            const text = document.getElementById('opinionPhone').value;

            if (text.trim() === "") {
                alert("Por favor escribe tu duda o consejo sobre la propuesta.");
                return;
            }

            const data = {
                username: "Evaluador de Hardware/Propuestas",
                content: `📱 **OPINIÓN DE LA PROPUESTA DE EQUIPO**\n**Tía:** Tía ${selectedTia}\n**Opinión/Consejo del Celular:** ${text}\n\n*Nota: ¡Recuerda que esto será posible si saca buenas calificaciones! 🔥*`
            };

            document.getElementById('btnStep2').disabled = true;

            try {
                await fetch(webhookPropuesta, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                alert(`¡Todo listo Tía ${selectedTia}! El reporte completo fue enviado a la central del administrador con éxito.`);
                document.getElementById('opinionPhone').value = "";
                document.getElementById('btnStep2').innerText = "✓ ENVIADO CON ÉXITO";
            } catch (e) { alert("Error al enviar."); }
        }
    </script>
</body>
</html>
