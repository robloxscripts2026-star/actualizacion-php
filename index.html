<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA DE INVERSIÓN TECNOLÓGICA XD V1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;700&display=swap');

        body {
            font-family: 'Chakra Petch', sans-serif;
            background: #010204;
            color: #e0e6ed;
            margin: 0;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; perspective: 1200px;
        }

        #bg-stars {
            position: absolute; width: 100%; height: 100%;
            background: url('https://i.postimg.cc/T34S4S6G/stars.png') repeat;
            opacity: 0.25; animation: moveStars 120s linear infinite; z-index: -1;
        }
        @keyframes moveStars { from { background-position: 0 0; } to { background-position: 2000px 2000px; } }

        #device {
            width: 390px; height: 820px;
            background: #05070a; border: 20px solid #1a1a1a; border-radius: 65px;
            box-shadow: 0 0 100px rgba(255, 102, 0, 0.3), inset 0 0 30px rgba(255, 102, 0, 0.15);
            overflow: hidden; position: relative;
        }

        .page { display: none; flex-direction: column; height: 100%; padding: 30px 24px; background: radial-gradient(circle at center, #0d1117 0%, #010204 100%); overflow-y: auto; }
        .active { display: flex; animation: pageSlideIn 0.7s cubic-bezier(0.19, 1, 0.22, 1); }
        @keyframes pageSlideIn { from { opacity: 0; transform: scale(1.1) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .neon-orange { text-shadow: 0 0 10px #ff6600, 0 0 20px #ff6600; }
        
        .cyber-card {
            background: rgba(255, 102, 0, 0.02); 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 102, 0, 0.15); 
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .short-container {
            position: relative; width: 100%; padding-bottom: 110%; height: 0; overflow: hidden; border-radius: 20px;
            border: 1px solid rgba(255, 102, 0, 0.3); box-shadow: 0 0 20px rgba(255, 102, 0, 0.15);
        }
        .short-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Estrellas Doradas */
        .star-btn { cursor: pointer; transition: transform 0.2s; }
        .star-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <div id="bg-stars"></div>

    <div id="device">
        <div class="page active justify-between gap-3">
            
            <!-- Encabezado -->
            <div class="text-center">
                <h1 class="text-xl font-bold tracking-wider text-[#ff6600] neon-orange">SISTEMA EVALUADOR</h1>
                <p class="text-[10px] text-gray-400">PROYECTO DE INVERSIÓN V1.0</p>
            </div>

            <!-- REPRODUCTOR DEL YOUTUBE SHORT -->
            <div class="short-container">
                <iframe 
                    src="https://www.youtube.com/embed/QWNoqk6-fIw?rel=0&modestbranding=1&loop=1&playlist=QWNoqk6-fIw" 
                    title="Proyecto Demo" frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>
            </div>

            <!-- FORMULARIO DE CALIFICACIÓN -->
            <form id="evaluationForm" class="cyber-card p-4 flex flex-col gap-3">
                
                <!-- Identificación de la Tía -->
                <div>
                    <label class="text-[11px] uppercase tracking-wider text-gray-400 block mb-1 font-bold">¿Quién está evaluando?</label>
                    <select id="tiaName" required class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-[#ff6600]">
                        <option value="" disabled selected>Selecciona tu nombre...</option>
                        <option value="Luisa">Tía Luisa</option>
                        <option value="Pau">Tía Pau</option>
                        <option value="Andrea">Tía Andrea</option>
                    </select>
                </div>

                <!-- Sistema de Estrellas (1 al 5) -->
                <div class="text-center">
                    <label class="text-[11px] uppercase tracking-wider text-gray-400 block mb-1 font-bold">Calificación del Video</label>
                    <div class="flex justify-center gap-2 text-xl my-1">
                        <i class="fa-star fa-regular star-btn text-gray-600" data-value="1" onclick="setRating(1)"></i>
                        <i class="fa-star fa-regular star-btn text-gray-600" data-value="2" onclick="setRating(2)"></i>
                        <i class="fa-star fa-regular star-btn text-gray-600" data-value="3" onclick="setRating(3)"></i>
                        <i class="fa-star fa-regular star-btn text-gray-600" data-value="4" onclick="setRating(4)"></i>
                        <i class="fa-star fa-regular star-btn text-gray-600" data-value="5" onclick="setRating(5)"></i>
                    </div>
                    <input type="hidden" id="starRating" value="0" required>
                </div>

                <!-- Cuadro de Opinión -->
                <div>
                    <label class="text-[11px] uppercase tracking-wider text-gray-400 block mb-1 font-bold">Tu Opinión</label>
                    <textarea id="tiaOpinion" rows="2" required placeholder="Escribe lo que piensas aquí..." class="w-full bg-[#0d1117] border border-gray-700 rounded-lg p-2 text-xs text-white resize-none focus:outline-none focus:border-[#ff6600]"></textarea>
                </div>

                <!-- Botón de Envío -->
                <button type="submit" id="submitBtn" class="w-full bg-[#ff6600] text-black font-bold text-xs py-2 rounded-xl shadow-[0_0_12px_rgba(255,102,0,0.3)] hover:bg-[#e05500] transition-all tracking-wider font-bold">
                    <i class="fa-solid fa-paper-plane mr-1"></i> ENVIAR EVALUACIÓN
                </button>
            </form>

            <!-- Footer -->
            <div class="text-center text-[9px] text-gray-600 tracking-widest">
                SISTEMA OPERADO POR CODEX EZZZ
            </div>
        </div>
    </div>

    <!-- LÓGICA DE CONTROL Y ENVÍO A DISCORD -->
    <script>
        let currentRating = 0;

        // Función para iluminar las estrellas de forma interactiva
        function setRating(rating) {
            currentRating = rating;
            document.getElementById('starRating').value = rating;
            const stars = document.querySelectorAll('.star-btn');
            
            stars.forEach(star => {
                const val = parseInt(star.getAttribute('data-value'));
                if (val <= rating) {
                    star.classList.remove('fa-regular', 'text-gray-600');
                    star.classList.add('fa-solid', 'text-amber-400');
                } else {
                    star.classList.remove('fa-solid', 'text-amber-400');
                    star.classList.add('fa-regular', 'text-gray-600');
                }
            });
        }

        // Manejador del envío del Formulario
        document.getElementById('evaluationForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = document.getElementById('tiaName').value;
            const rating = document.getElementById('starRating').value;
            const opinion = document.getElementById('tiaOpinion').value;

            if (rating === "0") {
                alert("Por favor, selecciona una calificación en estrellas antes de enviar. ⭐");
                return;
            }

            // URL de tus Webhooks de Discord fijas en el código
            const webhookLuisa = "https://discord.com/api/webhooks/1491367258470219796/PApu8j67Mnz9GN8JK6vqPCiNlaZvoqnEG9GBEjSBEOXAawRGc_UY-EMXVNnenDxzUjlr";
            const webhookTias = "https://discord.com/api/webhooks/1491657056686571540/CRJs0yxAdBGDf9xu-ViXGb-o9kz92f6JhZcl37n-K8yq6EbCKlm2dwuNZ39TL_3eIMMp";

            // Selección de webhook automática según el remitente elegido
            let targetWebhook = (name === "Luisa") ? webhookLuisa : webhookTias;

            // Formato exacto del mensaje que llegará a tu canal de Discord
            const discordMessage = {
                username: "Sistema de Inversión V1.0",
                avatar_url: "https://i.postimg.cc/T34S4S6G/stars.png",
                content: `**NUEVA EVALUACIÓN RECIBIDA**\n\n**Tía:** Tía ${name}\n**Estrellas:** ${"⭐".repeat(rating)} (${rating}/5)\n**Opinión:** ${opinion}`
            };

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "ENVIANDO DATOS...";

            try {
                const response = await fetch(targetWebhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(discordMessage)
                });

                if (response.ok) {
                    alert(`¡Gracias Tía ${name}! Tu opinión ha sido registrada con éxito de forma remota.`);
                    document.getElementById('evaluationForm').reset();
                    setRating(0); // Reiniciar estrellas
                } else {
                    alert("Error en la conexión con el servidor. Inténtalo de nuevo.");
                }
            } catch (error) {
                console.error(error);
                alert("Error al enviar los datos del sistema.");
            } finally {
                btn.disabled = false;
                btn.innerText = "ENVIAR EVALUACIÓN";
            }
        });
    </script>

</body>
</html>
